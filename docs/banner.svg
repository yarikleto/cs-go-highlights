<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="50%" style="stop-color:#161b22"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#eab308"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#eab308"/>
      <stop offset="100%" style="stop-color:#22c55e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" fill="url(#bg)" rx="12"/>

  <!-- Subtle grid lines -->
  <g opacity="0.04" stroke="#ffffff" stroke-width="0.5">
    <line x1="0" y1="40" x2="800" y2="40"/>
    <line x1="0" y1="80" x2="800" y2="80"/>
    <line x1="0" y1="120" x2="800" y2="120"/>
    <line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="100" y1="0" x2="100" y2="200"/>
    <line x1="200" y1="0" x2="200" y2="200"/>
    <line x1="300" y1="0" x2="300" y2="200"/>
    <line x1="400" y1="0" x2="400" y2="200"/>
    <line x1="500" y1="0" x2="500" y2="200"/>
    <line x1="600" y1="0" x2="600" y2="200"/>
    <line x1="700" y1="0" x2="700" y2="200"/>
  </g>

  <!-- Crosshair icon -->
  <g transform="translate(100, 100)" filter="url(#glow)">
    <circle cx="0" cy="0" r="22" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.9"/>
    <circle cx="0" cy="0" r="3" fill="#f97316"/>
    <line x1="0" y1="-32" x2="0" y2="-14" stroke="url(#accent)" stroke-width="2" opacity="0.9"/>
    <line x1="0" y1="14" x2="0" y2="32" stroke="url(#accent)" stroke-width="2" opacity="0.9"/>
    <line x1="-32" y1="0" x2="-14" y2="0" stroke="url(#accent)" stroke-width="2" opacity="0.9"/>
    <line x1="14" y1="0" x2="32" y2="0" stroke="url(#accent)" stroke-width="2" opacity="0.9"/>
  </g>

  <!-- Title -->
  <text x="160" y="90" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="42" font-weight="700" fill="#ffffff" letter-spacing="-0.5">CS:GO</text>
  <text x="335" y="90" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="42" font-weight="700" fill="url(#accent)" letter-spacing="-0.5">Highlights</text>

  <!-- Subtitle -->
  <text x="160" y="120" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="16" fill="#8b949e" letter-spacing="0.5">Demo parser &amp; highlight video generator for Windows</text>

  <!-- Pipeline visualization -->
  <g transform="translate(160, 148)">
    <rect x="0" y="0" width="72" height="26" rx="5" fill="#21262d" stroke="#f97316" stroke-width="1"/>
    <text x="36" y="17" font-family="'Segoe UI Mono', 'Cascadia Code', monospace" font-size="11" fill="#f97316" text-anchor="middle">analyze</text>

    <line x1="78" y1="13" x2="98" y2="13" stroke="#30363d" stroke-width="1.5" stroke-dasharray="4,3"/>
    <polygon points="95,9 103,13 95,17" fill="#30363d"/>

    <rect x="105" y="0" width="64" height="26" rx="5" fill="#21262d" stroke="#eab308" stroke-width="1"/>
    <text x="137" y="17" font-family="'Segoe UI Mono', 'Cascadia Code', monospace" font-size="11" fill="#eab308" text-anchor="middle">record</text>

    <line x1="175" y1="13" x2="195" y2="13" stroke="#30363d" stroke-width="1.5" stroke-dasharray="4,3"/>
    <polygon points="192,9 200,13 192,17" fill="#30363d"/>

    <rect x="202" y="0" width="72" height="26" rx="5" fill="#21262d" stroke="#22c55e" stroke-width="1"/>
    <text x="238" y="17" font-family="'Segoe UI Mono', 'Cascadia Code', monospace" font-size="11" fill="#22c55e" text-anchor="middle">process</text>

    <line x1="280" y1="13" x2="300" y2="13" stroke="#30363d" stroke-width="1.5" stroke-dasharray="4,3"/>
    <polygon points="297,9 305,13 297,17" fill="#30363d"/>

    <rect x="307" y="0" width="60" height="26" rx="5" fill="#21262d" stroke="#3b82f6" stroke-width="1"/>
    <text x="337" y="17" font-family="'Segoe UI Mono', 'Cascadia Code', monospace" font-size="11" fill="#3b82f6" text-anchor="middle">merge</text>
  </g>

  <!-- Film strip decoration on right -->
  <g transform="translate(660, 30)" opacity="0.08">
    <rect x="0" y="0" width="100" height="140" rx="4" fill="none" stroke="#ffffff" stroke-width="1.5"/>
    <rect x="5" y="8" width="12" height="8" rx="1" fill="#ffffff"/>
    <rect x="5" y="22" width="12" height="8" rx="1" fill="#ffffff"/>
    <rect x="5" y="36" width="12" height="8" rx="1" fill="#ffffff"/>
    <rect x="5" y="50" width="12" height="8" rx="1" fill="#ffffff"/>
    <rect x="5" y="64" width="12" height="8" rx="1" fill="#ffffff"/>
    <rect x="5" y="78" width="12" height="8" rx="1" fill="#ffffff"/>
    <rect x="5" y="92" width="12" height="8" rx="1" fill="#ffffff"/>
    <rect x="5" y="106" width="12" height="8" rx="1" fill="#ffffff"/>
    <rect x="5" y="120" width="12" height="8" rx="1" fill="#ffffff"/>
    <rect x="83" y="8" width="12" height="8" rx="1" fill="#ffffff"/>
    <rect x="83" y="22" width="12" height="8" rx="1" fill="#ffffff"/>
    <rect x="83" y="36" width="12" height="8" rx="1" fill="#ffffff"/>
    <rect x="83" y="50" width="12" height="8" rx="1" fill="#ffffff"/>
    <rect x="83" y="64" width="12" height="8" rx="1" fill="#ffffff"/>
    <rect x="83" y="78" width="12" height="8" rx="1" fill="#ffffff"/>
    <rect x="83" y="92" width="12" height="8" rx="1" fill="#ffffff"/>
    <rect x="83" y="106" width="12" height="8" rx="1" fill="#ffffff"/>
    <rect x="83" y="120" width="12" height="8" rx="1" fill="#ffffff"/>
    <rect x="22" y="10" width="56" height="40" rx="2" fill="#ffffff" opacity="0.3"/>
    <rect x="22" y="58" width="56" height="40" rx="2" fill="#ffffff" opacity="0.3"/>
    <rect x="22" y="106" width="56" height="24" rx="2" fill="#ffffff" opacity="0.3"/>
  </g>
</svg>
